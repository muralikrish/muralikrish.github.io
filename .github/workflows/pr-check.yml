name: PR Check - Validate & Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install html5validator
        run: pip install html5validator

      - name: Validate HTML files
        run: html5validator --root . --match '*.html'

  preview:
    name: Build Preview Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Upload website preview
        uses: actions/upload-artifact@v4
        with:
          name: website-preview
          path: |
            **/*.html
            **/*.jpg
            **/*.jpeg
            **/*.png
            **/*.svg
            **/*.css
            **/*.js
